name: Download YouTube, Split and Distribute (Mirror-Based)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "لینک ویدئوی یوتیوب"
        required: true
      github_username:
        description: "نام کاربری گیت‌هاب شما"
        required: true

jobs:
  process-file:
    runs-on: ubuntu-latest

    steps:
      - name: Install required tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl
          pip install yt-dlp

      - name: Extract Video ID
        id: extract
        run: |
          URL="${{ github.event.inputs.youtube_url }}"

          if echo "$URL" | grep -q "youtu.be/"; then
            VIDEO_ID=$(echo "$URL" | sed -n 's#.*youtu.be/\([^?&/]*\).*#\1#p')
          else
            VIDEO_ID=$(echo "$URL" | sed -n 's/.*v=\([^&]*\).*/\1/p')
          fi

          if [ -z "$VIDEO_ID" ]; then
            echo "Could not extract video ID"
            exit 1
          fi

          echo "video_id=$VIDEO_ID" >> "$GITHUB_OUTPUT"

      - name: Download Video via Mirror
        run: |
          VIDEO_ID="${{ steps.extract.outputs.video_id }}"

          # سعی روی چند mirror معروف (ممکن است بسته به زمان کار کنند یا نکنند)
          MIRRORS=(
            "https://yewtu.be/latest_version?id=$VIDEO_ID&itag=22"
            "https://invidious.snopyta.org/latest_version?id=$VIDEO_ID&itag=22"
            "https://piped.video/watch?v=$VIDEO_ID"
          )

          SUCCESS=0
          for URL in "${MIRRORS[@]}"; do
            echo "Trying: $URL"
            if curl -L --fail -o video.mp4 "$URL"; then
              SUCCESS=1
              break
            fi
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "Failed to download from all mirrors"
            exit 1
          fi

      - name: Prepare File
        run: |
          file video.mp4

      - name: Split File
        run: |
          split -b 95M -d video.mp4 part_

      - name: Distribute to Storage Repos
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          USERNAME: ${{ github.event.inputs.github_username }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          PARTS=(part_*)
          TOTAL_PARTS=${#PARTS[@]}

          REPO_COUNTER=1
          PART_COUNTER=0

          while [ $PART_COUNTER -lt $TOTAL_PARTS ]; do
            REPO_NAME="Storage-$REPO_COUNTER"
            echo "Processing $REPO_NAME..."

            git clone https://$USERNAME:$GITHUB_TOKEN@github.com/$USERNAME/$REPO_NAME.git target_repo
            cd target_repo

            for ((i=0; i<6 && PART_COUNTER<TOTAL_PARTS; i++)); do
              cp ../${PARTS[$PART_COUNTER]} .
              PART_COUNTER=$((PART_COUNTER+1))
            done

            git add .
            git commit -m "Add parts for $REPO_NAME" || echo "No changes"
            git push origin main || git push origin master

            cd ..
            rm -rf target_repo
            REPO_COUNTER=$((REPO_COUNTER+1))
          done
