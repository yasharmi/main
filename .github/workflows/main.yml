name: Download YouTube, Split and Distribute (No-login Safe)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "لینک ویدئوی یوتیوب"
        required: true
      github_username:
        description: "نام کاربری گیت‌هاب شما"
        required: true

jobs:
  process-file:
    runs-on: ubuntu-latest

    steps:
      - name: Install yt-dlp
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install yt-dlp

      - name: Convert URL to Proxy (Piped / Invidious)
        id: convert
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          # اگر لینک از youtube.com بود، به آینه piped و invidious تغییر بده
          if echo "$URL" | grep -q "youtube.com\|youtu.be"; then
            echo "Using proxy mirror..."
            VIDEO_ID=$(yt-dlp --get-id "$URL") || exit 1
            PROXY_URL="https://piped.video/watch?v=$VIDEO_ID"
            echo "proxy_url=$PROXY_URL" >> "$GITHUB_OUTPUT"
          else
            echo "proxy_url=$URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Video via Proxy
        run: |
          VIDEO_ID=$(echo "${{ github.event.inputs.youtube_url }}" | sed -n 's/.*v=\([^&]*\).*/\1/p')
          curl -L "https://yewtu.be/latest_version?id=$VIDEO_ID&itag=22" -o video.mp4

      - name: Prepare File
        run: |
          FILE=$(ls video.*)
          mv "$FILE" main_file.mp4

      - name: Split File
        run: |
          split -b 95M -d main_file.mp4 part_

      - name: Distribute to Storage Repos
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          USERNAME: ${{ github.event.inputs.github_username }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          PARTS=(part_*)
          TOTAL_PARTS=${#PARTS[@]}
          
          REPO_COUNTER=1
          PART_COUNTER=0

          while [ $PART_COUNTER -lt $TOTAL_PARTS ]; do
            REPO_NAME="Storage-$REPO_COUNTER"
            echo "Processing $REPO_NAME..."
            
            git clone https://$USERNAME:$GITHUB_TOKEN@github.com/$USERNAME/$REPO_NAME.git target_repo
            cd target_repo
            
            for ((i=0; i<6 && PART_COUNTER<TOTAL_PARTS; i++)); do
              cp ../${PARTS[$PART_COUNTER]} .
              PART_COUNTER=$((PART_COUNTER+1))
            done
            
            git add .
            git commit -m "Add parts for $REPO_NAME" || echo "No changes"
            git push origin main || git push origin master
            
            cd ..
            rm -rf target_repo
            REPO_COUNTER=$((REPO_COUNTER+1))
          done
