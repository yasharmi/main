name: Download YouTube, Split and Distribute (Python-Based)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "لینک ویدئوی یوتیوب"
        required: true
      github_username:
        description: "نام کاربری گیت‌هاب شما"
        required: true

jobs:
  process-file:
    runs-on: ubuntu-latest

    steps:
      - name: Install required tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install pytubefix
        run: pip install pytubefix

      - name: Download Video via Python
        run: |
          python -c "
          from pytubefix import YouTube
          import sys
          
          url = '${{ github.event.inputs.youtube_url }}'
          try:
              # استفاده از کلاینت اندروید برای دور زدن تشخیص ربات یوتیوب
              yt = YouTube(url, client='ANDROID')
              stream = yt.streams.filter(progressive=True, file_extension='mp4').order_by('resolution').desc().first()
              print(f'Downloading: {yt.title}')
              stream.download(filename='video.mp4')
              print('Download completed!')
          except Exception as e:
              print(f'Error: {e}')
              sys.exit(1)
          "


      - name: Prepare File
        run: |
          file video.mp4

      - name: Split File
        run: |
          split -b 95M -d video.mp4 part_

      - name: Distribute to Storage Repos
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          USERNAME: ${{ github.event.inputs.github_username }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          PARTS=(part_*)
          TOTAL_PARTS=${#PARTS[@]}

          REPO_COUNTER=1
          PART_COUNTER=0

          while [ $PART_COUNTER -lt $TOTAL_PARTS ]; do
            REPO_NAME="Storage-$REPO_COUNTER"
            echo "Processing $REPO_NAME..."

            git clone https://$USERNAME:$GITHUB_TOKEN@github.com/$USERNAME/$REPO_NAME.git target_repo
            cd target_repo

            for ((i=0; i<6 && PART_COUNTER<TOTAL_PARTS; i++)); do
              cp ../${PARTS[$PART_COUNTER]} .
              PART_COUNTER=$((PART_COUNTER+1))
            done

            git add .
            git commit -m "Add parts for $REPO_NAME" || echo "No changes"
            git push origin main || git push origin master

            cd ..
            rm -rf target_repo
            REPO_COUNTER=$((REPO_COUNTER+1))
          done
