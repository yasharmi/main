name: YouTube to GitHub Storage (macOS Bypass)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      github_username:
        description: 'Your GitHub Username'
        required: true
        type: string

jobs:
  download-split-push:
    runs-on: macos-latest # استفاده از مک‌اواس برای دور زدن مسدودی آی‌پی
    steps:
      - name: Install dependencies (yt-dlp, deno, coreutils)
        run: |
          brew install yt-dlp deno coreutils
          
      - name: Download Video via yt-dlp
        run: |
          url="${{ github.event.inputs.youtube_url }}"
          echo "Downloading $url..."
          
          # استفاده از کلاینت‌های مختلف برای فریب دادن سیستم ضد ربات
          yt-dlp --extractor-args "youtube:player_client=ios,web" -f "best[ext=mp4]" -o "video.mp4" "$url"
          
          echo "Download completed!"

      - name: Check file and Split
        run: |
          # بررسی صحت فایل ویدئو
          file video.mp4
          
          # استفاده از gsplit (نسخه لینوکسی split در مک) برای تکه‌تکه کردن
          gsplit -b 95M -d video.mp4 part_
          
          # نمایش پارت‌های ساخته شده
          ls -lh part_*

      - name: Distribute to Storage Repositories
        env:
          USERNAME: ${{ github.event.inputs.github_username }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # ایجاد آرایه از تمام پارت‌ها
          PARTS=(part_*)
          TOTAL_PARTS=${#PARTS[@]}
          echo "Total parts to process: $TOTAL_PARTS"
          
          REPO_COUNTER=1
          PART_INDEX=0
          
          # حلقه برای توزیع پارت‌ها در ریپوها
          while [ $PART_INDEX -lt $TOTAL_PARTS ]; do
            REPO_NAME="Storage-$REPO_COUNTER"
            echo "Cloning and pushing to $REPO_NAME..."
            
            git clone https://$USERNAME:$GITHUB_TOKEN@github.com/$USERNAME/$REPO_NAME.git target_repo
            cd target_repo
            
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            COPIED=0
            while [ $COPIED -lt 6 ] && [ $PART_INDEX -lt $TOTAL_PARTS ]; do
              cp ../${PARTS[$PART_INDEX]} .
              echo "Copied ${PARTS[$PART_INDEX]} to $REPO_NAME"
              PART_INDEX=$((PART_INDEX + 1))
              COPIED=$((COPIED + 1))
            done
            
            git add part_*
            git commit -m "Upload video parts" || echo "No changes to commit"
            git push origin main || git push origin master
            
            cd ..
            rm -rf target_repo
            
            REPO_COUNTER=$((REPO_COUNTER + 1))
          done
